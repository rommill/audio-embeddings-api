name: DevOps CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t audio-api .

      - name: Run Tests inside Container
        run: |
          docker run --name test-container -d audio-api
          docker exec test-container pytest test_main.py
          docker stop test-container
